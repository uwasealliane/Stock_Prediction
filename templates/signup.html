<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Signup | StockPrice AI</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    background:
    linear-gradient(
        135deg,
        #020617,
        #0f172a,
        #111827
    );
}

.signup-container{

    width:430px;

    background:rgba(15,23,42,0.95);

    border:1px solid rgba(255,255,255,0.08);

    border-radius:30px;

    padding:45px;
}

.logo{

    text-align:center;

    margin-bottom:35px;
}

.logo h1{

    color:white;

    font-size:34px;
}

.logo i{

    color:#38bdf8;
}

.logo p{

    color:#94a3b8;

    margin-top:10px;
}

.input-box{

    margin-bottom:22px;
}

.input-box label{

    color:#cbd5e1;

    display:block;

    margin-bottom:10px;
}

.input-box input{

    width:100%;

    height:58px;

    border:none;

    outline:none;

    border-radius:16px;

    background:#020617;

    color:white;

    padding:0 18px;

    font-size:17px;

    border:1px solid rgba(255,255,255,0.08);
}

.signup-btn{

    width:100%;

    height:60px;

    border:none;

    border-radius:18px;

    background:
    linear-gradient(
        135deg,
        #22c55e,
        #16a34a
    );

    color:white;

    font-size:18px;

    font-weight:700;

    cursor:pointer;

    margin-top:10px;
}

.bottom-text{

    text-align:center;

    margin-top:25px;

    color:#94a3b8;
}

.bottom-text a{

    color:#38bdf8;

    text-decoration:none;

    font-weight:600;
}

.flash-message{

    background:rgba(239,68,68,0.15);

    color:#f87171;

    padding:15px;

    border-radius:12px;

    margin-bottom:20px;

    text-align:center;
}

</style>

</head>

<body>

<div class="signup-container">

    <div class="logo">

        <h1>
            <i class="fas fa-chart-line"></i>
            StockPrice AI
        </h1>

        <p>
            Create your account
        </p>

    </div>

    {% with messages = get_flashed_messages() %}

        {% if messages %}

            <div class="flash-message">

                {{ messages[0] }}

            </div>

        {% endif %}

    {% endwith %}

    <form method="POST">

        <div class="input-box">

            <label>Username</label>

            <input
            type="text"
            name="username"
            placeholder="Enter username"
            required>

        </div>

        <div class="input-box">

            <label>Email</label>

            <input
            type="email"
            name="email"
            placeholder="Enter email"
            required>

        </div>

        <div class="input-box">

            <label>Password</label>

            <input
            type="password"
            name="password"
            placeholder="Enter password"
            required>

        </div>

        <button
        type="submit"
        class="signup-btn">

            Create Account

        </button>

    </form>

    <div class="bottom-text">

        Already have account?

        <a href="/login">

            Login

        </a>

    </div>

</div>

</body>
</html>
