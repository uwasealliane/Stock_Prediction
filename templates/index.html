<!DOCTYPE html>
<html>
<head>
    <title>Stock Prediction</title>
</head>
<body>

<h2>📊 Stock Price Prediction System</h2>

<form method="POST">
    <input type="number" name="days" placeholder="Enter number of days" required>
    <button type="submit">Predict</button>
</form>

<!-- ERROR MESSAGE -->
{% if error %}
    <p style="color:red;">{{ error }}</p>
{% endif %}

<!-- PREDICTIONS -->
{% if predictions %}
<h3>Predictions</h3>

<table border="1">
    <tr>
        <th>Day</th>
        <th>Predicted Price</th>
    </tr>

    {% for p in predictions %}
    <tr>
        <td>{{ loop.index }}</td>
        <td>{{ p }}</td>
    </tr>
    {% endfor %}
</table>
{% endif %}

<!-- METRICS -->
{% if mae %}
<h3>📏 MAE</h3>
<p>{{ mae }}</p>

<h3>📉 RMSE</h3>
<p>{{ rmse }}</p>
{% endif %}

</body>
</html>
